<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RAG Evaluation Suite</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2'%3E%3Ccircle cx='12' cy='12' r='3'/%3E%3Cpath d='M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/pages/styles.css">
</head>
<body>

<!-- Header -->
<header>
  <button onclick="toggleSidebar()" title="Toggle sidebar" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:5px 8px;display:flex;align-items:center;gap:3px;transition:all .15s" onmouseover="this.style.borderColor='#3b82f6';this.style.color='#3b82f6'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
    <span style="display:block;width:14px;height:2px;background:currentColor;border-radius:2px;box-shadow:0 4px 0 currentColor, 0 -4px 0 currentColor"></span>
  </button>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
    <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
  </svg>
  <span style="font-size:15px;font-weight:700;letter-spacing:-0.2px">RAG Evaluation Platform</span>
</header>

<div class="app-body">

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="sidebar-section-label">Overview</div>
  <button class="toc-link active" id="toc-home" onclick="showHome()">
    <span class="toc-dot"></span> Home
  </button>

  <div class="sidebar-section-label">RAG Strategies</div>
  <button class="toc-link" id="toc-naive" onclick="showNaiveRAG()">
    <span class="toc-dot"></span> Naive RAG
  </button>
  <button class="toc-link" id="toc-hybrid" onclick="showHybridRAG()">
    <span class="toc-dot"></span> Hybrid RAG
  </button>
  <button class="toc-link" id="toc-advanced" onclick="showAdvancedRAG()">
    <span class="toc-dot"></span> Advanced RAG
  </button>
  <button class="toc-link" id="toc-graph" onclick="showGraphRAG()">
    <span class="toc-dot"></span> Graph RAG
  </button>
  <button class="toc-link" id="toc-agentic" onclick="showAgenticRAG()">
    <span class="toc-dot"></span> Agentic RAG
  </button>
  <button class="toc-link" id="toc-summary" onclick="showSummary()">
    <span class="toc-dot"></span> Summary
  </button>
  <button class="toc-link" id="toc-eval" onclick="showEval()">
    <span class="toc-dot"></span> RAG Evaluation
  </button>

  <div class="sidebar-section-label">Frameworks</div>
  <div style="padding:8px 16px 4px;display:flex;align-items:center;gap:8px">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span style="font-size:11px;font-weight:700;color:#f59e0b;letter-spacing:.05em;text-transform:uppercase">Under Construction</span>
  </div>
  <div class="toc-coming">LangChain Orchestration</div>

</aside>

<div class="page-content">
  <div id="content" style="flex:1;overflow:hidden;display:flex;flex-direction:column;width:100%;min-width:0"></div>
</div>

</div><!-- end app-body -->

<!-- ══ CODE MODAL ══════════════════════════════════════════════════════════ -->
<div id="lc-code-modal" onclick="if(event.target===this)hideLCCode()"
  style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9000;align-items:center;justify-content:center;padding:24px">
  <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;width:min(780px,95vw);max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6)">

    <!-- header -->
    <div style="display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:#162033">
      <svg id="lc-code-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      <span id="lc-code-modal-title" style="font-weight:700;font-size:14px;color:var(--text)"></span>
      <span id="lc-code-variant-badge" style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;flex:1"></span>
      <button id="lc-copy-btn" onclick="lcCopyCode()"
        style="background:#1e293b;border:1px solid var(--border);border-radius:6px;color:var(--muted);font:12px inherit;padding:4px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px"
        onmouseover="this.style.borderColor='#a855f7';this.style.color='#a855f7'"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy
      </button>
      <button onclick="hideLCCode()"
        style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font:13px inherit;padding:4px 10px;cursor:pointer;transition:all .15s;line-height:1"
        onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)'"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">✕</button>
    </div>

    <!-- file label -->
    <div style="padding:8px 20px;background:#0f1e35;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px">
      <span id="lc-code-dot" style="display:inline-block;width:10px;height:10px;background:#3b82f6;border-radius:50%;flex-shrink:0"></span>
      <span id="lc-code-filename" style="font-size:11px;color:var(--muted);font-family:monospace"></span>
    </div>

    <!-- code body -->
    <div style="overflow-y:auto;flex:1">
      <pre id="lc-code-content"
        style="margin:0;padding:20px;font:13px/1.75 'Cascadia Code','Consolas','Courier New',monospace;color:#e2e8f0;white-space:pre;overflow-x:auto;min-height:100%"></pre>
    </div>

  </div>
</div>

<script src="/pages/app.js" defer></script>
</body>
</html>
