<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
  <!-- Upload bar -->
  <div class="upload-bar">
    <label class="upload-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Upload Document
      <input type="file" id="fileInput" accept=".pdf,.txt" onchange="uploadFile(this)">
    </label>
    <span class="upload-status" id="uploadStatus">No document loaded — please upload a PDF or TXT file</span>
    <button class="reset-btn" onclick="clearAll()">Clear</button>
  </div>
  <!-- Tabs -->
  <nav id="tabBar"></nav>
  <!-- Panels -->
  <main id="main"></main>
</div>
